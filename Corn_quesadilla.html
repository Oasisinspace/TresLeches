<body>
  <h1>Corn quesadilla</h1>
  <h2>Ingredients</h2>
  <ul>
    <li>2 1/4 cups all-purpose flour</li>
    <li>1 tsp baking soda</li>
    <li>1 tsp salt</li>
    <li>1 cup butter, softened</li>
    <li>3/4 cup granulated sugar</li>
    <li>3/4 cup brown sugar</li>
    <li>2 large eggs</li>
    <li>2 cups chocolate chips</li>
  </ul>
